app-id: com.carlos.WallShuffle
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: wallshuffle
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: python3-requests
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} requests
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/70/8e/0e2d847013cb52cd35b38c009bb16791a27221474010a42ead94c03f15ad/requests-2.31.0.tar.gz
        sha256: 942c5a30ed9f305f054775d3b2e7ef92271a9e144a6f79-TRUNCATED

  - name: python3-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/python-pillow/Pillow.git
        tag: 10.0.0

  - name: wallshuffle
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/com.carlos.WallShuffle.desktop ${FLATPAK_DEST}/share/applications/com.carlos.WallShuffle.desktop
      - install -Dm644 data/com.carlos.WallShuffle.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.carlos.WallShuffle.metainfo.xml
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.carlos.WallShuffle.png
    sources:
      - type: dir
        path: ..
